<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome HR Madam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
}

.container h1{
    font-size:50px;
    margin-bottom:20px;
    animation:fadeIn 2s;
}

.container p{
    font-size:22px;
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    display:flex;
    justify-content:center;
    align-items:center;
}

.popup-content{
    width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    animation:zoom .5s;
    box-shadow:0 0 25px rgba(0,0,0,.4);
}

.popup-content h2{
    color:#0b84ff;
    margin-bottom:15px;
}

.popup-content p{
    color:#444;
    font-size:18px;
    margin-bottom:25px;
}

button{
    padding:12px 40px;
    border:none;
    border-radius:30px;
    background:#0b84ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#005fd1;
    transform:scale(1.08);
}

@keyframes zoom{
from{
transform:scale(.2);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">
    <h1>🌸 Welcome HR Madam 🌸</h1>
    <p>😊 Hope you are having a wonderful day! 😊</p>
</div>

<div class="popup" id="popup">

<div class="popup-content">

<h2>💐 Welcome HR Madam 💐</h2>

<p>
Thank you very much for opening this link.<br><br>

Wishing you a wonderful evening! 😊<br>
Please click the <b>OK</b> button to continue.
</p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script>
function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
